<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Noa -- Monthly View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary-container": "#f0607a",
          "surface-container-low": "#1d1b1e",
          "surface-container-high": "#2c292c",
          "on-surface": "#e7e1e5",
          "on-surface-variant": "#dfbfc1",
          "background": "#151316",
          "outline-variant": "#584143",
        },
        fontFamily: { "body": ["Inter"] },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background-color: #151316; color: #e7e1e5; font-family: 'Inter', sans-serif; min-height: 100dvh; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  .glass-card { background: rgba(55,52,55,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(88,65,67,0.15); }
  .day-cell { min-height: 120px; transition: background 0.1s; cursor: pointer; }
  .day-cell:active { opacity: 0.8; }
  .chip { display: block; font-size: 10px; font-weight: 700; padding: 3px 6px; border-radius: 5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.5; }
</style>
</head>
<body class="min-h-screen pb-32">

<header class="sticky top-0 z-50 backdrop-blur-md flex justify-between items-center px-5 py-4">
  <div class="flex items-center gap-2">
    <span class="material-symbols-outlined text-[#F0607A]" style="font-variation-settings:'FILL' 1;">radio_button_checked</span>
    <span class="text-xl font-bold tracking-tighter">Noa</span>
  </div>
</header>

<main class="px-3 max-w-2xl mx-auto w-full space-y-4 pt-1">

  <!-- Month nav -->
  <div class="flex items-center justify-between px-1">
    <button id="prev-month" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#2c292c] transition-colors">
      <span class="material-symbols-outlined text-[#dfbfc1]">chevron_left</span>
    </button>
    <div class="text-center">
      <h2 id="month-label" class="text-2xl font-bold tracking-tight"></h2>
      <p id="year-label" class="text-[10px] uppercase tracking-[0.15rem] font-bold text-[#dfbfc1]"></p>
    </div>
    <button id="next-month" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[#2c292c] transition-colors">
      <span class="material-symbols-outlined text-[#dfbfc1]">chevron_right</span>
    </button>
  </div>

  <!-- Course legend -->
  <div id="course-legend" class="flex flex-wrap gap-2 px-1 min-h-[20px]"></div>

  <!-- Day headers -->
  <div class="grid grid-cols-7 text-center border-b border-[#373437] pb-2">
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Sun</span>
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Mon</span>
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Tue</span>
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Wed</span>
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Thu</span>
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Fri</span>
    <span class="text-[10px] uppercase tracking-[0.1rem] font-bold text-[#584143]">Sat</span>
  </div>

  <!-- Calendar grid -->
  <div id="calendar-grid" class="grid grid-cols-7 gap-px bg-[#2c292c] rounded-xl overflow-hidden border border-[#2c292c]"></div>

  <!-- Selected day panel -->
  <div id="day-panel" class="hidden glass-card rounded-2xl p-5 space-y-3">
    <div class="flex justify-between items-center">
      <h3 id="day-panel-title" class="font-bold"></h3>
      <button id="day-panel-close" class="text-[#dfbfc1]">
        <span class="material-symbols-outlined text-base">close</span>
      </button>
    </div>
    <div id="day-panel-content" class="space-y-3"></div>
  </div>

</main>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full px-4 bg-[#373437]/40 backdrop-blur-xl z-50 flex justify-around items-center h-16 shadow-[0_20px_40px_rgba(82,55,135,0.06)]">
  <a href="index.html" class="flex flex-col items-center justify-center text-[#6B6070] hover:text-[#F0607A]/70 transition-colors">
    <span class="material-symbols-outlined">bolt</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Now</span>
  </a>
  <a href="plan.html" class="flex flex-col items-center justify-center text-[#F0607A] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#F0607A] after:rounded-full after:shadow-[0_0_8px_#F0607A] scale-110">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Plan</span>
  </a>
  <a href="goals.html" class="flex flex-col items-center justify-center text-[#6B6070] hover:text-[#F0607A]/70 transition-colors">
    <span class="material-symbols-outlined">ads_click</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Goals</span>
  </a>
</nav>

<!-- Noa Side Panel -->
<div id="noa-overlay" class="fixed inset-0 bg-black/40 z-[90] hidden backdrop-blur-sm"></div>
<div id="noa-panel" class="fixed right-0 top-0 h-full w-[360px] max-w-[90vw] bg-[#1d1b1e] z-[100] transform translate-x-full transition-transform duration-300 flex flex-col shadow-2xl border-l border-[#584143]/20">
  <div class="flex items-center justify-between px-5 py-4 border-b border-[#584143]/20">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[#F0607A]" style="font-variation-settings:'FILL' 1;">radio_button_checked</span>
      <span class="font-bold tracking-tight">Noa</span>
    </div>
    <button id="noa-close" class="text-[#dfbfc1] hover:text-[#e7e1e5] transition-colors">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <div id="noa-messages" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
  <div class="p-4 border-t border-[#584143]/20">
    <div class="relative">
      <input id="noa-input" class="w-full h-12 bg-[#211f22] rounded-xl pl-4 pr-12 text-[#e7e1e5] placeholder:text-[#dfbfc1]/50 focus:outline-none focus:ring-1 focus:ring-[#f0607a]/30 text-sm" placeholder="Talk to Noa..." type="text"/>
      <button id="noa-send" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg bg-[#f0607a] flex items-center justify-center text-[#5b001c] hover:scale-105 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-sm">send</span>
      </button>
    </div>
  </div>
</div>
<button id="noa-toggle" class="fixed right-0 top-1/2 -translate-y-1/2 z-[89] bg-[#f0607a] text-[#5b001c] py-5 px-2 rounded-l-2xl shadow-lg hover:px-3 transition-all flex flex-col items-center gap-2">
  <span class="material-symbols-outlined text-lg" style="font-variation-settings:'FILL' 1;">radio_button_checked</span>
  <span class="text-[8px] font-bold uppercase" style="writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:0.15em">Noa</span>
</button>
<script src="/noa-chat.js"></script>

<script>
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const today = new Date();
  today.setHours(0, 0, 0, 0);
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();
  let selectedDate = null;
  let itemsByDate = {};
  let courses = [];

  function dateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  async function loadCanvas() {
    try {
      const res = await fetch('/api/canvas');
      const data = await res.json();
      itemsByDate = {};
      for (const item of (data.allItems || [])) {
        const key = item.dueDate ? item.dueDate.split('T')[0] : null;
        if (!key) continue;
        if (!itemsByDate[key]) itemsByDate[key] = [];
        itemsByDate[key].push(item);
      }
      courses = data.courses || [];
      renderLegend();
      renderGrid();
    } catch (e) {}
  }

  function renderLegend() {
    const legend = document.getElementById('course-legend');
    if (!courses.length) { legend.innerHTML = ''; return; }
    legend.innerHTML = courses.map(c => `
      <div class="flex items-center gap-1.5">
        <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${c.color}"></div>
        <span class="text-[10px] font-bold text-[#dfbfc1] uppercase tracking-wider">${c.name || 'Course'}</span>
      </div>
    `).join('');
  }

  function renderGrid() {
    document.getElementById('month-label').textContent = MONTHS[viewMonth];
    document.getElementById('year-label').textContent = viewYear;

    const grid = document.getElementById('calendar-grid');
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;

    for (let i = 0; i < totalCells; i++) {
      let cellDate, isCurrentMonth;
      if (i < firstDay) {
        cellDate = new Date(viewYear, viewMonth - 1, daysInPrevMonth - firstDay + i + 1);
        isCurrentMonth = false;
      } else if (i < firstDay + daysInMonth) {
        cellDate = new Date(viewYear, viewMonth, i - firstDay + 1);
        isCurrentMonth = true;
      } else {
        cellDate = new Date(viewYear, viewMonth + 1, i - firstDay - daysInMonth + 1);
        isCurrentMonth = false;
      }

      const key = dateStr(cellDate);
      const isToday = cellDate.getTime() === today.getTime();
      const isSelected = selectedDate && dateStr(selectedDate) === key;
      const items = itemsByDate[key] || [];

      const cell = document.createElement('div');
      cell.className = `day-cell p-2 flex flex-col ${
        isToday ? 'bg-[#2a1a1e]' : isSelected ? 'bg-[#2c292c]' : 'bg-[#151316] hover:bg-[#1d1b1e]'
      }`;

      // Date number
      const numEl = document.createElement('div');
      numEl.className = 'flex items-center justify-between mb-1';
      const num = document.createElement('span');
      num.className = `text-sm font-bold leading-none ${
        isToday
          ? 'w-6 h-6 rounded-full bg-[#F0607A] text-[#5b001c] flex items-center justify-center text-xs'
          : isCurrentMonth ? 'text-[#e7e1e5]' : 'text-[#584143]'
      }`;
      num.textContent = cellDate.getDate();
      numEl.appendChild(num);
      cell.appendChild(numEl);

      // Assignment chips (max 2 visible, then +N)
      const chipsWrap = document.createElement('div');
      chipsWrap.className = 'flex flex-col gap-px flex-1 overflow-hidden';
      const maxVisible = 3;
      const visible = items.slice(0, maxVisible);
      const overflow = items.length - maxVisible;

      for (const item of visible) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.style.background = item.courseColor + '22';
        chip.style.color = item.courseColor;
        chip.style.borderLeft = `2px solid ${item.courseColor}`;
        // Strip leading type prefix for readability
        const label = item.title.replace(/^[LMP][\d_\s]+/i, '').trim() || item.title;
        chip.textContent = label;
        chipsWrap.appendChild(chip);
      }
      if (overflow > 0) {
        const more = document.createElement('span');
        more.className = 'text-[9px] font-bold text-[#584143] pl-1';
        more.textContent = `+${overflow} more`;
        chipsWrap.appendChild(more);
      }
      cell.appendChild(chipsWrap);

      cell.addEventListener('click', () => {
        selectedDate = new Date(cellDate);
        renderGrid();
        showPanel(cellDate, items);
      });

      grid.appendChild(cell);
    }
  }

  function showPanel(date, items) {
    const panel = document.getElementById('day-panel');
    const title = document.getElementById('day-panel-title');
    const content = document.getElementById('day-panel-content');
    title.textContent = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    if (!items.length) {
      content.innerHTML = '<p class="text-sm text-[#dfbfc1] opacity-50">Nothing due from Canvas.</p>';
    } else {
      content.innerHTML = items.map(item => `
        <div class="flex items-start gap-3 py-1">
          <div class="w-0.5 h-full self-stretch rounded-full mt-1 flex-shrink-0" style="background:${item.courseColor};min-height:32px"></div>
          <div>
            <p class="text-sm font-semibold text-[#e7e1e5] leading-snug">${item.title}</p>
            <p class="text-[10px] uppercase tracking-wider font-bold mt-0.5" style="color:${item.courseColor}">${item.courseName || item.type}</p>
          </div>
        </div>
      `).join('');
    }
    panel.classList.remove('hidden');
    setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  }

  document.getElementById('day-panel-close').addEventListener('click', () => {
    document.getElementById('day-panel').classList.add('hidden');
    selectedDate = null;
    renderGrid();
  });

  document.getElementById('prev-month').addEventListener('click', () => {
    if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
    selectedDate = null;
    document.getElementById('day-panel').classList.add('hidden');
    renderGrid();
  });
  document.getElementById('next-month').addEventListener('click', () => {
    if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
    selectedDate = null;
    document.getElementById('day-panel').classList.add('hidden');
    renderGrid();
  });

  renderGrid();
  loadCanvas();
</script>
</body>
</html>
