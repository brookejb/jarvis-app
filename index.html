<body class="bg-background min-h-screen flex flex-col">
<header class="fixed top-0 left-0 right-0 z-50 bg-transparent flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
  <div class="flex items-center gap-2 text-xl font-bold text-[#e7e1e5]">
    <span class="material-symbols-outlined text-[#F0607A] scale-95" style="font-variation-settings: 'FILL' 1;">radio_button_checked</span>
    <span class="text-2xl font-bold tracking-tighter">Noa</span>
  </div>
  <div class="flex flex-col items-end">
    <span id="header-date" class="uppercase tracking-[0.15rem] text-[10px] font-bold text-on-surface-variant"></span>
  </div>
</header>

<main class="flex-grow pt-24 pb-32 px-6 max-w-2xl mx-auto w-full space-y-10">
  <!-- Greeting -->
  <div class="max-w-[85%] glass-card p-5 rounded-2xl rounded-tl-none border border-outline-variant/10">
    <p id="greeting-text" class="text-on-surface leading-relaxed opacity-50">Good morning, Brooke...</p>
  </div>

  <!-- Feeling buttons -->
  <div class="flex flex-wrap gap-3">
    <button onclick="noaSend('I\'m feeling sharp today')" class="px-5 py-2.5 rounded-full glass-card border border-outline-variant/20 uppercase tracking-[0.15rem] text-[10px] font-bold text-on-surface-variant hover:opacity-80 transition-opacity">Sharp</button>
    <button onclick="noaSend('I\'m feeling solid today')" class="px-5 py-2.5 rounded-full bg-primary-container text-on-primary-container uppercase tracking-[0.15rem] text-[10px] font-bold shadow-[0_0_20px_rgba(240,96,122,0.3)] scale-110">Solid</button>
    <button onclick="noaSend('I\'m feeling meh today')" class="px-5 py-2.5 rounded-full glass-card border border-outline-variant/20 uppercase tracking-[0.15rem] text-[10px] font-bold text-on-surface-variant hover:opacity-80 transition-opacity">Meh</button>
    <button onclick="noaSend('I\'m feeling burnt out today')" class="px-5 py-2.5 rounded-full glass-card border border-outline-variant/20 uppercase tracking-[0.15rem] text-[10px] font-bold text-on-surface-variant hover:opacity-80 transition-opacity">Burnt</button>
  </div>

  <!-- Priority Matrix -->
  <div class="w-full glass-card border border-outline-variant/15 rounded-3xl p-6 space-y-6">
    <div class="flex justify-between items-center">
      <h3 class="uppercase tracking-[0.15rem] text-[10px] font-bold text-on-surface-variant">Priority Matrix</h3>
      <span class="material-symbols-outlined text-on-surface-variant text-sm">more_horiz</span>
    </div>
    <div id="priority-list" class="space-y-4">
      <div class="flex items-center gap-4 group">
        <div class="w-1.5 h-10 rounded-full bg-tertiary-container shadow-[0_0_12px_#5092eb]"></div>
        <div class="flex-grow">
          <p class="text-sm font-medium text-on-surface">Finish Ch. 4 Thermo Practice</p>
          <span class="text-[9px] uppercase tracking-wider text-tertiary-container font-bold">Academic</span>
        </div>
      </div>
      <div class="flex items-center gap-4 group">
        <div class="w-1.5 h-10 rounded-full bg-[#E87D4A] shadow-[0_0_12px_#E87D4A]"></div>
        <div class="flex-grow">
          <p class="text-sm font-medium text-on-surface">M Racing: Aero Review</p>
          <span class="text-[9px] uppercase tracking-wider text-[#E87D4A] font-bold">Racing</span>
        </div>
      </div>
      <div class="flex items-center gap-4 group">
        <div class="w-1.5 h-10 rounded-full bg-[#7DD4B0] shadow-[0_0_12px_#7DD4B0]"></div>
        <div class="flex-grow">
          <p class="text-sm font-medium text-on-surface">Gym: Lower Body</p>
          <span class="text-[9px] uppercase tracking-wider text-[#7DD4B0] font-bold">Movement</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Morning Routine -->
  <div class="flex flex-col items-start space-y-6">
    <a href="morning-routine.html" class="w-full py-5 rounded-full bg-gradient-to-r from-primary-container to-[#ad2d4a] text-on-primary-fixed font-bold text-sm tracking-tight flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-[0_20px_40px_rgba(240,96,122,0.15)]">
      Begin Morning Routine
      <span class="material-symbols-outlined">arrow_forward</span>
    </a>
  </div>

  <!-- Quick replies -->
  <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
    <button onclick="noaSend('Help me reschedule something')" class="whitespace-nowrap px-4 py-2 rounded-full glass-card border border-outline-variant/10 text-[10px] font-bold uppercase tracking-wider text-on-surface-variant hover:opacity-80 transition-opacity">Reschedule something</button>
    <button onclick="noaSend('What\'s due this week?')" class="whitespace-nowrap px-4 py-2 rounded-full glass-card border border-outline-variant/10 text-[10px] font-bold uppercase tracking-wider text-on-surface-variant hover:opacity-80 transition-opacity">What's due this week?</button>
    <button onclick="noaSend('Update my priorities for today')" class="whitespace-nowrap px-4 py-2 rounded-full glass-card border border-outline-variant/10 text-[10px] font-bold uppercase tracking-wider text-on-surface-variant hover:opacity-80 transition-opacity">Update priorities</button>
  </div>
</main>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full px-4 bg-[#373437]/40 backdrop-blur-xl z-50 flex justify-around items-center h-16 shadow-[0_20px_40px_rgba(82,55,135,0.06)]">
  <a href="index.html" class="flex flex-col items-center justify-center text-[#F0607A] relative after:content-[''] after:absolute after:-bottom-1 after:w-1 after:h-1 after:bg-[#F0607A] after:rounded-full after:shadow-[0_0_8px_#F0607A] scale-110">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">today</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Today</span>
  </a>
  <a href="weekly.html" class="flex flex-col items-center justify-center text-[#6B6070] hover:text-[#F0607A]/70 transition-colors">
    <span class="material-symbols-outlined">date_range</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Week</span>
  </a>
  <a href="goals.html" class="flex flex-col items-center justify-center text-[#6B6070] hover:text-[#F0607A]/70 transition-colors">
    <span class="material-symbols-outlined">ads_click</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Goals</span>
  </a>
  <a href="metrics.html" class="flex flex-col items-center justify-center text-[#6B6070] hover:text-[#F0607A]/70 transition-colors">
    <span class="material-symbols-outlined">equalizer</span>
    <span class="uppercase tracking-[0.15rem] text-[9px] font-bold">Metrics</span>

<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none z-0"></div>

<!-- Noa Side Panel -->
<div id="noa-overlay" class="fixed inset-0 bg-black/40 z-[90] hidden backdrop-blur-sm"></div>
<div id="noa-panel" class="fixed right-0 top-0 h-full w-[360px] max-w-[90vw] bg-[#1d1b1e] z-[100] transform translate-x-full transition-transform duration-300 flex flex-col shadow-2xl border-l border-[#584143]/20">
  <div class="flex items-center justify-between px-5 py-4 border-b border-[#584143]/20">
    <div class="flex items-center gap-2">
      <span class="material-symbols-outlined text-[#F0607A]" style="font-variation-settings:'FILL' 1;">radio_button_checked</span>
      <span class="font-bold tracking-tight">Noa</span>
    </div>
    <button id="noa-close" class="text-[#dfbfc1] hover:text-[#e7e1e5] transition-colors">
      <span class="material-symbols-outlined">close</span>
    </button>
  </div>
  <div id="noa-messages" class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar"></div>
  <div class="p-4 border-t border-[#584143]/20">
    <div class="relative">
      <input id="noa-input" class="w-full h-12 bg-[#211f22] rounded-xl pl-4 pr-12 text-[#e7e1e5] placeholder:text-[#dfbfc1]/50 focus:outline-none focus:ring-1 focus:ring-[#f0607a]/30 text-sm" placeholder="Talk to Noa..." type="text"/>
      <button id="noa-send" class="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-lg bg-[#f0607a] flex items-center justify-center text-[#5b001c] hover:scale-105 active:scale-95 transition-transform">
        <span class="material-symbols-outlined text-sm">send</span>
      </button>
    </div>
  </div>
</div>
<button id="noa-toggle" class="fixed right-0 top-1/2 -translate-y-1/2 z-[89] bg-[#f0607a] text-[#5b001c] py-5 px-2 rounded-l-2xl shadow-lg hover:px-3 transition-all flex flex-col items-center gap-2">
  <span class="material-symbols-outlined text-lg" style="font-variation-settings:'FILL' 1;">radio_button_checked</span>
  <span class="text-[8px] font-bold uppercase" style="writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:0.15em">Noa</span>
</button>

<script>
  // Priority matrix
  const COLOR_MAP = {
    blue:   { hex: '#5092eb', shadow: '0 0 12px #5092eb' },
    orange: { hex: '#E87D4A', shadow: '0 0 12px #E87D4A' },
    green:  { hex: '#7DD4B0', shadow: '0 0 12px #7DD4B0' },
    pink:   { hex: '#F0607A', shadow: '0 0 12px #F0607A' },
    purple: { hex: '#c3a6ff', shadow: '0 0 12px #c3a6ff' },
  };

  function renderPriorityItem(item) {
    const c = COLOR_MAP[item.color] || COLOR_MAP.blue;
    const div = document.createElement('div');
    div.className = 'flex items-center gap-4 group';
    div.innerHTML = `
      <div class="w-1.5 h-10 rounded-full flex-shrink-0" style="background-color:${c.hex};box-shadow:${c.shadow};"></div>
      <div class="flex-grow">
        <p class="text-sm font-medium text-on-surface">${item.label}</p>
        <span class="text-[9px] uppercase tracking-wider font-bold" style="color:${c.hex};">${item.category}</span>
      </div>
    `;
    return div;
  }

  function setPriorities(items) {
    const list = document.getElementById('priority-list');
    if (!list) return;
    list.innerHTML = '';
    items.forEach(item => list.appendChild(renderPriorityItem(item)));
    try { localStorage.setItem('noa_priorities', JSON.stringify(items)); } catch (e) {}
  }

  // Load saved priorities
  try {
    const saved = localStorage.getItem('noa_priorities');
    if (saved) {
      const items = JSON.parse(saved);
      if (Array.isArray(items) && items.length > 0) setPriorities(items);
    }
  } catch (e) {}

  // Hook for noa-chat.js to update page elements
  window.onNoaAction = function(a) {
    if (a.type === 'set_priorities' && a.items) setPriorities(a.items);
  };

  // Date header
  const headerDate = document.getElementById('header-date');
  if (headerDate) {
    headerDate.textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'short', day: 'numeric',
    }).toUpperCase();
  }

  // Personalized greeting
  async function loadGreeting() {
    try {
      const res = await fetch('/api/greeting');
      const data = await res.json();
      const el = document.getElementById('greeting-text');
      if (el && data.greeting) {
        el.textContent = data.greeting;
        el.classList.remove('opacity-50');
      }
    } catch (e) {
      const el = document.getElementById('greeting-text');
      if (el) { el.textContent = 'Good morning, Brooke. What are we tackling today?'; el.classList.remove('opacity-50'); }
    }
  }
  loadGreeting();
</script>
<script src="/noa-chat.js"></script>
</body>
