<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Jarvis — Morning Routine</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary-container": "#f0607a",
          "surface-container": "#211f22",
          "surface-container-highest": "#373437",
          "on-primary-container": "#5b001c",
          "secondary-container": "#523787",
          "surface-container-low": "#1d1b1e",
          "on-surface": "#e7e1e5",
          "on-surface-variant": "#dfbfc1",
          "background": "#151316",
          "outline-variant": "#584143",
        },
        fontFamily: { "headline": ["Inter"], "body": ["Inter"] },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  .glass-panel { background: rgba(55, 52, 55, 0.15); backdrop-filter: blur(20px); border: 1px solid rgba(88, 65, 67, 0.15); }
  .nocturnal-bg { background: radial-gradient(circle at 20% 30%, rgba(82, 55, 135, 0.15) 0%, transparent 50%), radial-gradient(circle at 80% 70%, rgba(240, 96, 122, 0.1) 0%, transparent 50%), #151316; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { min-height: max(884px, 100dvh); }
</style>
</head>
<body class="nocturnal-bg text-on-surface font-body min-h-screen flex flex-col overflow-hidden">
<header class="flex justify-between items-center w-full px-6 py-4 max-w-screen-xl mx-auto">
  <div class="flex items-center gap-2 text-xl font-bold text-[#e7e1e5]">
    <span class="material-symbols-outlined text-[#F0607A]">radio_button_checked</span>
    <span class="tracking-tighter font-headline">Jarvis</span>
  </div>
  <div class="flex items-center gap-4">
    <span class="text-[10px] uppercase tracking-[0.15rem] text-on-surface-variant font-bold">Step 2 of 6</span>
  </div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 text-left max-w-xl mx-auto w-full">
  <div class="w-full flex gap-1.5 mb-16 h-1">
    <div class="flex-1 h-full bg-primary-container rounded-full"></div>
    <div class="flex-1 h-full bg-primary-container rounded-full"></div>
    <div class="flex-1 h-full bg-surface-container-highest rounded-full"></div>
    <div class="flex-1 h-full bg-surface-container-highest rounded-full"></div>
    <div class="flex-1 h-full bg-surface-container-highest rounded-full"></div>
    <div class="flex-1 h-full bg-surface-container-highest rounded-full"></div>
  </div>
  <section class="space-y-4 w-full">
    <span class="text-[10px] uppercase tracking-[0.2rem] text-on-surface-variant font-bold">Current Task</span>
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter leading-tight text-on-surface">Drink water, take your supplements.</h1>
  </section>
  <div class="relative flex items-center justify-center my-20">
    <div class="absolute w-64 h-64 rounded-full bg-secondary-container opacity-10 blur-[60px]"></div>
    <svg class="w-64 h-64 transform -rotate-90">
      <circle class="text-surface-container-highest" cx="128" cy="128" fill="transparent" r="120" stroke="currentColor" stroke-width="4"></circle>
      <circle class="text-primary-container" cx="128" cy="128" fill="transparent" r="120" stroke="currentColor" stroke-dasharray="753.6" stroke-dashoffset="188.4" stroke-width="4"></circle>
    </svg>
    <div class="absolute flex flex-col items-center">
      <span class="text-7xl font-bold tracking-tighter tabular-nums">01:45</span>
      <span class="text-[10px] uppercase tracking-[0.15rem] text-on-surface-variant opacity-60">Remaining</span>
    </div>
  </div>
  <div class="glass-panel w-full p-5 rounded-2xl flex items-center gap-4 mb-10">
    <div class="w-10 h-10 rounded-full bg-primary-container/20 flex items-center justify-center text-primary-container">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">water_drop</span>
    </div>
    <div>
      <p class="text-sm font-bold text-on-surface">Hydration Goal</p>
      <p class="text-xs text-on-surface-variant">Recommended: 500ml of room temp water.</p>
    </div>
  </div>
</main>
<footer class="p-8 pb-12 flex flex-col items-center gap-6 w-full max-w-xl mx-auto">
  <a href="routine-complete.html" class="w-full h-16 bg-gradient-to-r from-primary-container to-[#f2748b] rounded-full text-on-primary-container font-bold text-lg flex items-center justify-center gap-2 shadow-[0_20px_40px_rgba(240,96,122,0.15)] active:scale-95 transition-transform">
    Done
    <span class="material-symbols-outlined">arrow_forward</span>
  </a>
  <a href="index.html" class="text-[10px] uppercase tracking-[0.15rem] text-on-surface-variant font-bold hover:text-on-surface transition-colors">Skip this step</a>
</footer>
<div class="fixed -z-10 top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px]"></div>
<div class="fixed -z-10 bottom-[5%] left-[-10%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px]"></div>
</body>
</html>
